<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GrowSim v1</title>
    <meta name="description" content="GrowSim v1 – browserbasierte Wachstumssimulation ohne Build-Tools" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>GrowSim v1</h1>
      <p class="subtitle">Interaktive Wachstumssimulation (Spezifikation A–F)</p>
    </header>

    <main class="layout">
      <section class="panel controls" aria-labelledby="controls-heading">
        <h2 id="controls-heading">Steuerung</h2>

        <label>
          Startgröße
          <input type="range" id="startSize" min="1" max="80" value="20" />
          <output id="startSizeOut">20</output>
        </label>

        <label>
          Wachstumsrate / Tick (%)
          <input type="range" id="growthRate" min="1" max="30" value="8" />
          <output id="growthRateOut">8</output>
        </label>

        <label>
          Tick-Intervall (ms)
          <input type="range" id="tickMs" min="100" max="2000" step="100" value="600" />
          <output id="tickMsOut">600</output>
        </label>

        <div class="buttons">
          <button id="startBtn" type="button">Start</button>
          <button id="pauseBtn" type="button" disabled>Pause</button>
          <button id="resetBtn" type="button">Reset</button>
        </div>

        <p id="status" class="status" aria-live="polite">Bereit</p>
      </section>

      <section class="panel simulation" aria-labelledby="sim-heading">
        <h2 id="sim-heading">Simulation</h2>
        <div class="sim-stage">
          <div id="plant" class="plant" role="img" aria-label="Wachstumspflanze"></div>
        </div>

        <dl class="metrics">
          <div>
            <dt>Tick</dt>
            <dd id="metricTick">0</dd>
          </div>
          <div>
            <dt>Größe</dt>
            <dd id="metricSize">20</dd>
          </div>
          <div>
            <dt>Max erreicht</dt>
            <dd id="metricMax">Nein</dd>
          </div>
        </dl>
      </section>
    </main>

    <footer class="app-footer">
      <small>Static Build-Paket A–F · Bereit für GitHub Pages</small>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
