<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>GrowSim.v1</title>
    <link rel="stylesheet" href="./css/tokens.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>
    <svg width="0" height="0" style="position: absolute">
      <defs>
        <symbol id="i-water" viewBox="0 0 24 24"><path d="M12 3C9 7 6 10 6 14a6 6 0 0 0 12 0c0-4-3-7-6-11Z" fill="none" stroke="currentColor" stroke-width="1.8"/></symbol>
        <symbol id="i-feed" viewBox="0 0 24 24"><path d="M5 18h14M7 14h10M9 10h6M11 6h2" stroke="currentColor" stroke-width="1.8"/></symbol>
        <symbol id="i-growth" viewBox="0 0 24 24"><path d="M12 20V9M12 9l-4 4M12 9l4 4" stroke="currentColor" stroke-width="1.8" fill="none"/></symbol>
        <symbol id="i-analysis" viewBox="0 0 24 24"><path d="M4 19h16M7 15l3-3 3 2 4-5" stroke="currentColor" stroke-width="1.8" fill="none"/></symbol>
      </defs>
    </svg>

    <main class="app" data-ui="root">
      <p class="c-alert-banner" data-ui="load-error" data-state="critical" hidden></p>

      <section class="hud" data-screen="dashboard">
        <header class="topbar">
          <span class="c-status-chip" data-ui="status-chip" data-state="normal">Status: normal</span>
          <span class="pro-pill">💎 Pro <strong data-ui="ad-count">0/6</strong></span>
        </header>

        <section class="hero c-card">
          <div class="hero__halo"></div>
          <div class="hud__rings">
            <article class="c-ring" data-ring-size="large" data-ring="health"><svg viewBox="0 0 100 100"><circle class="c-ring__track" cx="50" cy="50" r="42" stroke-width="15"></circle><circle class="c-ring__value" cx="50" cy="50" r="42" stroke-width="15"></circle></svg><div class="c-ring__label"><span>Health<small class="c-ring__value-text" data-role="value">0%</small></span></div></article>
            <article class="c-ring" data-ring-size="large" data-ring="stress"><svg viewBox="0 0 100 100"><circle class="c-ring__track" cx="50" cy="50" r="42" stroke-width="15"></circle><circle class="c-ring__value" cx="50" cy="50" r="42" stroke-width="15"></circle></svg><div class="c-ring__label"><span>Stress<small class="c-ring__value-text" data-role="value">0%</small></span></div></article>
          </div>

          <div class="c-plant" data-stage="seedling" data-ui-state="normal">
            <div class="c-plant__glow"></div>
            <svg viewBox="0 0 220 220">
              <g data-stage-group="seedling">
                <path d="M110 182V132" stroke="#7fffcf" stroke-width="6"/>
                <path d="M110 140C84 140 70 112 72 86C96 88 110 108 110 140Z" fill="#49f7aa"/>
                <path d="M110 146C136 146 150 118 148 92C124 94 110 114 110 146Z" fill="#73ffd0"/>
              </g>
              <g data-stage-group="vegetative">
                <path d="M110 186V76" stroke="#84ffd4" stroke-width="7"/>
                <path d="M110 136C74 136 48 108 50 64C86 66 110 92 110 136Z" fill="#4ef4a7"/>
                <path d="M110 118C146 118 172 90 170 46C134 48 110 74 110 118Z" fill="#6bf8bf"/>
                <path d="M110 112C84 112 66 88 66 60C90 60 110 80 110 112Z" fill="#53e99f"/>
                <path d="M110 126C136 126 154 100 154 72C130 72 110 92 110 126Z" fill="#6cffc8"/>
              </g>
              <g data-stage-group="flower">
                <path d="M110 186V70" stroke="#91ffd8" stroke-width="7"/>
                <path d="M110 120C80 120 56 98 58 60C90 62 110 84 110 120Z" fill="#50eba4"/>
                <path d="M110 108C140 108 164 86 162 48C130 50 110 72 110 108Z" fill="#67f5bc"/>
                <ellipse cx="110" cy="62" rx="14" ry="24" fill="#ff74a0"/>
                <circle cx="110" cy="54" r="16" fill="#ffe091"/>
                <ellipse cx="96" cy="78" rx="8" ry="12" fill="#ff90b4"/>
                <ellipse cx="124" cy="78" rx="8" ry="12" fill="#ff90b4"/>
              </g>
            </svg>
          </div>
        </section>

        <section class="info-bar c-card">
          <div class="info-cell">
            <div class="info-label">Aktuelle Phase</div>
            <strong data-ui="phase-label">Seedling</strong>
          </div>
          <div class="info-cell">
            <div class="info-label">Nächstes Event</div>
            <strong data-ui="next-event">in 00:00</strong>
            <small data-ui="next-event-meta">Nächstes Lernereignis</small>
          </div>
          <div class="time-pill" data-ui="sim-time">00:00</div>
        </section>

        <section class="hud__mini c-card metrics-card">
          <article class="c-ring c-ring--mini" data-ring-size="mini" data-ring="water"><svg viewBox="0 0 100 100"><circle class="c-ring__track" cx="50" cy="50" r="40" stroke-width="8"></circle><circle class="c-ring__value" cx="50" cy="50" r="40" stroke-width="8"></circle></svg><div class="c-ring__label">Water<small class="c-ring__value-text" data-role="value"></small></div></article>
          <article class="c-ring c-ring--mini" data-ring-size="mini" data-ring="nutrition"><svg viewBox="0 0 100 100"><circle class="c-ring__track" cx="50" cy="50" r="40" stroke-width="8"></circle><circle class="c-ring__value" cx="50" cy="50" r="40" stroke-width="8"></circle></svg><div class="c-ring__label">Nutrition<small class="c-ring__value-text" data-role="value"></small></div></article>
          <article class="c-ring c-ring--mini" data-ring-size="mini" data-ring="growth"><svg viewBox="0 0 100 100"><circle class="c-ring__track" cx="50" cy="50" r="40" stroke-width="8"></circle><circle class="c-ring__value" cx="50" cy="50" r="40" stroke-width="8"></circle></svg><div class="c-ring__label">Growth<small class="c-ring__value-text" data-role="value"></small></div></article>
          <article class="c-ring c-ring--mini" data-ring-size="mini" data-ring="risk"><svg viewBox="0 0 100 100"><circle class="c-ring__track" cx="50" cy="50" r="40" stroke-width="8"></circle><circle class="c-ring__value" cx="50" cy="50" r="40" stroke-width="8"></circle></svg><div class="c-ring__label">Risk<small class="c-ring__value-text" data-role="value"></small></div></article>
        </section>

        <nav class="main-actions">
          <button class="c-btn c-btn--primary" data-action="open-care">Care</button>
          <button class="c-btn c-btn--secondary" data-action="open-analysis">Analyze</button>
          <button class="c-btn c-btn--boost" data-action="boost-ad">Boost <small data-ui="boost-meta">Ad supported · 0/6 today</small></button>
        </nav>

        <div class="c-alert-banner" data-ui="alert-banner" data-state="normal"></div>
      </section>

      <section class="screen c-card" data-screen="analysis" data-locked="true" hidden>
        <h2><svg width="16" height="16"><use href="#i-analysis"/></svg> Diagnose</h2>
        <div class="analysis-data"></div>
        <div class="analysis-lock c-card">
          <h3>🔒 Premium Diagnose gesperrt</h3>
          <p>Freischalten per Analyse-Ad für tiefere Auswertung und Empfehlungen.</p>
          <button class="c-btn c-btn--secondary" data-action="analysis-ad">Jetzt freischalten</button>
        </div>

        <article class="c-card log-card">
          <h3>Session Log</h3>
          <ul data-ui="history"></ul>
        </article>
        <div class="analysis-actions">
          <button class="c-btn c-btn--secondary" data-action="open-dashboard">Zurück</button>
          <button class="c-btn" data-action="export-telemetry">Export JSONL</button>
        </div>
      </section>
    </main>

    <div class="sheet-backdrop" data-ui="sheet-backdrop" hidden></div>

    <div class="sheet-wrap" data-ui="care-wrap" data-open="false" hidden>
      <article class="sheet">
        <header class="sheet__header"><h3>Pflege-Menü</h3></header>
        <div class="sheet__content care-actions">
          <button class="c-btn" data-action="water">Wasser</button>
          <button class="c-btn" data-action="feed">Feed</button>
          <button class="c-btn" data-action="prune">Prune</button>
          <button class="c-btn" data-action="open-dashboard">Dashboard</button>
          <button class="c-btn c-btn--danger" data-action="emergency-ad" data-prominent="false">Emergency</button>
          <button class="c-btn c-btn--secondary" data-action="close-care">Close</button>
        </div>
      </article>
    </div>

    <div class="sheet-wrap" data-ui="event-wrap" data-open="false" hidden>
      <article class="sheet sheet--event">
        <header class="sheet__header">
          <h3 data-ui="event-title"></h3>
          <button class="sheet__close" type="button" data-action="close-event">Close</button>
        </header>
        <p data-ui="event-body"></p>
        <div class="event-actions" data-ui="event-actions"></div>
      </article>
    </div>

    <div class="c-toast" data-ui="toast"></div>
    <div class="c-scanline" data-ui="scanline"></div>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
